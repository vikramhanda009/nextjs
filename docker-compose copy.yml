version: "3.9"

services:
  nextjs:
    container_name: nextjs-app
    build:
      context: .
      args:
        NODE_ENV: ${NODE_ENV}
    ports:
      - "3000:3000"
    env_file:
      - .env.${NODE_ENV}
    environment:
      - NODE_ENV=${NODE_ENV}
    restart: unless-stopped
    profiles: ["dev", "local", "staging", "prod"]
